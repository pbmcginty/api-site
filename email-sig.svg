<svg xmlns="http://www.w3.org/2000/svg" width="500" height="120" viewBox="0 0 500 120">
  <!-- transparent background -->

  <!-- Anchor -->
  <text x="50" y="72" text-anchor="middle" font-size="48">⚓</text>

  <!-- Name -->
  <text x="95" y="48" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#3A7AB0" letter-spacing="1">
    Patrick McGinty
  </text>

  <!-- Title -->
  <text x="95" y="68" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#6BAEE8" letter-spacing="3" text-transform="uppercase">
